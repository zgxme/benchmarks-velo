# VeloDB SSB Update SF100 (100%) Benchmark Configuration

# Engine connection information
engine:
  type: "velodb"
  connection:
    fe_host: "${FE_HOST:-127.0.0.1}"
    fe_http_port: "${FE_HTTP_PORT:-8030}"
    fe_query_port: "${FE_QUERY_PORT:-9030}"
    user: "root"
    password: "${PASSWORD:-}"
    db: "${DB:-ssb}"

# Benchmark parameters
parameters:
  load: "${LOAD:-false}"
  query: "${QUERY:-false}"
  query_times: "${QUERY_TIMES:-3}"

# Test resource paths (relative to this YAML file)
paths:
  ddl: "ddl/ddl.sql"
  load_dir: "load/"
  query_mode: "line"
  query_dirs:
    - "query/"
