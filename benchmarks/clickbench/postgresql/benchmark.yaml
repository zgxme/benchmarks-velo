# PostgreSQL ClickBench Benchmark Configuration

# Engine connection information
engine:
  type: "postgresql" # Engine type
  connection:
    pg_host: "${PG_HOST:-127.0.0.1}" # PostgreSQL host
    pg_port: "${PG_PORT:-5432}" # PostgreSQL port
    user: "${PG_USER:-postgres}" # PostgreSQL username
    password: "${PG_PASSWORD:-}" # PostgreSQL password
    db: "${DB:-clickbench}" # PostgreSQL database name

# Test execution parameters
parameters:
  load: "${LOAD:-false}" # Whether to run data loading phase
  query: "${QUERY:-false}" # Whether to run benchmark query
  session: "${SESSION:-false}" # Whether to run session setup phase
  analyze: "${ANALYZE:-false}" # Whether to run analyze phase
  query_times: "${QUERY_TIMES:-3}" # Number of times to run each query
  jmeter: "${JMETER:-false}" # Whether to run jmeter phase
  threads: "${JMETER_THREADS:-50}" # Number of JMeter threads
  loops: "${JMETER_LOOPS:-1}" # Number of loops per thread
  duration: "${JMETER_DURATION:-180}" # Test duration in seconds (0 = use loops)
  query_by_query: "${QUERY_BY_QUERY:-true}" # Run queries one by one (true) or concurrently with random selection (false)

# Test resource paths (relative to this YAML file)
paths:
  ddl: "ddl/ddl.sql" # DDL setup file
  load_dir: "load/" # Directory containing data loading scripts
  query_mode: "line" # Query file format: "line" (each line is a query) or "file" (entire file is one query)
  query_dirs: # Query directories to test
    - "query/" # ClickBench queries
