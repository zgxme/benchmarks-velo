# Amazon Reviews Benchmark Configuration (With Inverted Index)
# Tests query performance with inverted indexes enabled

# Engine connection information
engine:
  type: "doris"
  connection:
    fe_host: "${FE_HOST:-127.0.0.1}"
    fe_http_port: "${FE_HTTP_PORT:-8030}"
    fe_query_port: "${FE_QUERY_PORT:-9030}"
    user: "admin"
    password: "${PASSWORD:-}"
    db: "${DB:-amazon_reviews_indexed}"

# Test execution parameters
parameters:
  load: "${LOAD:-true}"
  query: "${QUERY:-true}"
  session: "${SESSION:-true}"
  analyze: "${ANALYZE:-true}"
  query_times: "${QUERY_TIMES:-3}"
  jmeter: "${JMETER:-true}"
  threads: "${JMETER_THREADS:-50}"
  loops: "${JMETER_LOOPS:-1}"
  duration: "${JMETER_DURATION:-180}"
  query_by_query: "${QUERY_BY_QUERY:-true}"

# Test resource paths
paths:
  ddl: "ddl/ddl.sql"
  session: "session/session.sql"
  analyze: "analyze/analyze.sql"
  load_dir: "load/"
  query_mode: "line"
  query_dirs:
    - "query/"
